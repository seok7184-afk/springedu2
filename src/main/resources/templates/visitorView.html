<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>방명록 목록</title>
    <link rel="stylesheet" href="/css/visitor.css">
    <style>
        .title {
            background-color: lightpink;
            color: white;
            text-shadow: none;
        }

        table {
            margin: 5px auto;
            border-radius: 20px;
            background-color: #fff;
        }
        tb {
            border-bottom: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        tr:hover {
            background-color: lightpink;
        }
        td:nth-of-type(1) {width: 100px;}
        td:nth-of-type(2) {width: 150px;}
        div {
            margin: 10px auto;
            padding: 50px;
            width: 800px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<h1>방명록 리스트</h1>
<hr>
<div>
    <table th:if="${vList}">
        <tr>
            <th>작성자</th>
            <th>작성일</th>
            <th>내용</th>
            <th>삭제</th>
            <th>수정</th>
        </tr>
        <tr th:each="vo : ${vList}">
            <!--<td>[[${vo.name}]]</td>-->
            <td th:text="${vo.name}"></td>
            <td>[[${vo.writeDate}]]</td>
            <td>[[${vo.memo}]]</td>
            <td>
                <form method="post" th:action="@{vdelete}"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <input type="hidden" name="" th:value="${vo.id}" />
                    <button type="submit" class="icon-button">
                        <img src="/img/delete.png" width="30" alt="삭제" />
                    </button>
                </form>
            </td>
            <td>
                <img src="/img/edit.png" width="30" alt="수정"
                     th:onclick="|displayUpdateForm(${vo.id})|" />
            </td>
        </tr>
    </table>

    <h3 th:if="${msg}" th:text="${msg}"></h3>
    <hr/>
    <a href="/visitorMain.html"><button>메인 페이지로 돌아가기</button></a>
</div>
<div id="updateForm" style="display: none;">
    <h2>글을 수정하세요</h2>
    <hr>
    <form method="post" action="/vupdate">
        <input type="hidden" name="id" id="updateid" value="">
        <input type="text" name="name" value="" placeholder="이름" required /><br />
        <textarea name="memo" rows="10" cols="35" required></textarea><br />
        <input type="submit" value="수정" />
        <input type="reset" value="재작성" onclick="resetForm(); return false" />
        <input type="button" value="취소" onclick="document.getElementById('updateForm').style.display='none'"/>

    </form>
</div>
<script>
    var updateIdEl = null;
    var nameEl = null;
    var memoEl = null;
    var prevData = null;

    // 수정 버튼 클릭
    function displayUpdateForm(id) {
        // 서버 정보 id로 조회
        fetch("/one?id=" + id)
            .then( response => {
                if(!response.ok){
                    throw new Error("방명록을 찾을 수 없습니다.")}
                return response.json();
            })
            .then( data => {
                console.log(data);
                prevData = data
                nameEl   = document.querySelector('[name=name]')
                memoEl   = document.querySelector('[name=memo]')
                updateIdEl     = document.querySelector('[id=updateid]')
                nameEl.value = data.name;
                memoEl.value = data.memo;
                updateIdEl.value = data.id;
            })
            .catch(error => alert(error.message))
        document.getElementById('updateForm').style.display='block'

    }

    function resetForm() {
        updateIdEl.value = prevData.id;
        nameEl.value = prevData.name;
        memoEl.value = prevData.memo;
    }

</script>
</body>
</html>
